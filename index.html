<!doctype html>
<html lang="th" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Table Generator</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Noto Sans Thai', 'Space Mono', sans-serif; }
        .drop-zone { transition: all 0.3s ease; }
        .drop-zone.dragover { border-color: #f59e0b; background: rgba(245,158,11,0.08); transform: scale(1.01); }
        .file-card { animation: slideUp 0.35s ease forwards; opacity: 0; }
        @keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        .table-appear { animation: fadeScale 0.4s ease forwards; }
        @keyframes fadeScale { from { opacity:0; transform:scale(0.97); } to { opacity:1; transform:scale(1); } }
        .toast { animation: toastIn 0.3s ease forwards; z-index: 100; }
        @keyframes toastIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #f59e0b; border-radius: 3px; }
    </style>
</head>
<body class="h-full">
    <div id="app" class="w-full h-full overflow-auto" style="background: #0f0f23;">
        <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>
        
        <div class="max-w-5xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
            <header class="text-center mb-10">
                <div class="inline-flex items-center gap-3 mb-3">
                    <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background: #f59e0b;">
                        <i data-lucide="image" style="width:22px;height:22px;color:#0f0f23;"></i>
                    </div>
                    <h1 id="page-title" class="text-3xl sm:text-4xl font-bold tracking-tight" style="color: #f5f5f0;">Image Table Generator</h1>
                </div>
                <p class="text-sm" style="color: #7a7a8e;">อัพโหลดรูปภาพที่มีตัวเลขในชื่อ → จัดเรียงคี่/คู่อัตโนมัติ → ส่งออก CSV</p>
            </header>

            <section id="upload-section" class="mb-8">
                <div id="drop-zone" class="drop-zone relative border-2 border-dashed rounded-2xl p-10 text-center cursor-pointer transition-all" style="border-color: #2a2a4a; background: #16162b;">
                    <input type="file" id="file-input" multiple accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <div class="flex flex-col items-center gap-3 pointer-events-none">
                        <div class="w-16 h-16 rounded-full flex items-center justify-center" style="background: rgba(245,158,11,0.12);">
                            <i data-lucide="upload-cloud" style="width:32px;height:32px;color:#f59e0b;"></i>
                        </div>
                        <p class="text-lg font-semibold" style="color: #f5f5f0;">ลากไฟล์มาวางที่นี่ หรือคลิกเพื่อเลือก</p>
                        <p class="text-xs" style="color: #7a7a8e;">ระบบจะตรวจจับตัวเลข "ตัวสุดท้าย" ในชื่อไฟล์เพื่อจัดลำดับ</p>
                    </div>
                </div>
            </section>

            <section id="file-list-section" class="mb-8 hidden">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold flex items-center gap-2" style="color: #f5f5f0;">
                        <i data-lucide="files" style="width:18px;height:18px;color:#f59e0b;"></i> 
                        ไฟล์ที่อัพโหลด (<span id="file-count">0</span>)
                    </h2>
                    <button id="clear-btn" class="text-xs px-3 py-1.5 rounded-lg font-medium transition-all hover:opacity-80" style="background: #2a2a4a; color: #f59e0b;">
                        <span class="flex items-center gap-1"><i data-lucide="trash-2" style="width:12px;height:12px;"></i> ล้างทั้งหมด</span>
                    </button>
                </div>
                <div id="file-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 mb-6"></div>
                <div class="text-center">
                    <button id="generate-btn" class="inline-flex items-center gap-2 px-8 py-3 rounded-xl text-base font-bold transition-all hover:scale-105 active:scale-95" style="background: #f59e0b; color: #0f0f23;">
                        <i data-lucide="table" style="width:20px;height:20px;"></i> สร้างตารางจัดเรียง
                    </button>
                </div>
            </section>

            <section id="table-section" class="mb-8 hidden">
                <div class="rounded-2xl overflow-hidden shadow-2xl" style="background: #16162b; border: 1px solid #2a2a4a;">
                    <div class="flex flex-col sm:flex-row items-center justify-between px-6 py-4 gap-4" style="border-bottom: 1px solid #2a2a4a;">
                        <h2 class="text-lg font-semibold flex items-center gap-2" style="color: #f5f5f0;">
                            <i data-lucide="layout-grid" style="width:18px;height:18px;color:#f59e0b;"></i> ผลลัพธ์การจับคู่
                        </h2>
                        <button id="download-btn" class="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-5 py-2 rounded-lg text-sm font-bold transition-all hover:scale-105 active:scale-95" style="background: #22c55e; color: #0f0f23;">
                            <i data-lucide="download" style="width:16px;height:16px;"></i> ดาวน์โหลด CSV
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr style="background: #1e1e38;">
                                    <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider" style="color: #f59e0b; width: 20%;">ชุดข้อมูล</th>
                                    <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider" style="color: #f59e0b;">คอลัมน์ 1 (เลขคี่)</th>
                                    <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider" style="color: #f59e0b;">คอลัมน์ 2 (เลขคู่)</th>
                                </tr>
                            </thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        // State Management
        let uploadedFiles = [];
        let tableData = [];

        // DOM Elements
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileListSection = document.getElementById('file-list-section');
        const fileGrid = document.getElementById('file-grid');
