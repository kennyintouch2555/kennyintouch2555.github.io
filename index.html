<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Organizer Gold - XLSX Supported</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #f43f5e;
            --success: #10b981;
            --dark-card: #1e293b;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: #0f172a;
            background-image: radial-gradient(at 0% 100%, rgba(99, 102, 241, 0.15) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, rgba(244, 63, 94, 0.15) 0, transparent 50%);
            color: #f1f5f9;
            margin: 0; padding: 40px 20px;
        }

        .container {
            max-width: 1000px; margin: auto;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(25px);
            border-radius: 35px; padding: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        h1 {
            font-family: 'Montserrat', sans-serif; text-align: center;
            background: linear-gradient(to right, #818cf8, #fb7185, #fcd34d);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 3rem; margin-bottom: 5px;
        }

        .upload-zone {
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 25px; padding: 40px; text-align: center;
            cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.03);
        }

        .upload-zone:hover { border-color: var(--primary); background: rgba(99, 102, 241, 0.1); }

        #instantPreview {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 12px; margin-top: 20px; max-height: 220px; overflow-y: auto; padding: 10px;
        }

        .preview-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px; border: 2px solid rgba(255,255,255,0.15); }

        .control-panel {
            display: grid; grid-template-columns: 1.5fr 1fr; gap: 25px;
            margin: 30px 0; padding: 25px; background: rgba(0,0,0,0.2); border-radius: 25px;
        }

        .search-container { position: relative; }
        input[type="text"] {
            width: 100%; background: #0f172a; border: 1px solid #475569;
            color: white; padding: 12px 15px; border-radius: 15px; margin-bottom: 10px; box-sizing: border-box;
        }

        #fileFormat {
            width: 100%; background: #334155; border: none; color: white;
            padding: 10px; border-radius: 15px; min-height: 120px; outline: none;
        }

        .btn {
            padding: 15px 25px; border-radius: 15px; border: none; font-weight: bold;
            cursor: pointer; transition: 0.3s; width: 100%; font-size: 1.1rem;
        }

        .btn-build { background: var(--primary); color: white; margin-bottom: 10px; }
        .btn-download { background: var(--success); color: white; }
        .btn:disabled { opacity: 0.2; cursor: not-allowed; transform: none !important; }
        .btn:hover:not(:disabled) { transform: translateY(-3px); filter: brightness(1.2); }

        .table-area { margin-top: 30px; background: white; border-radius: 25px; overflow: hidden; color: #1e293b; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f5f9; padding: 20px; font-weight: 600; border-bottom: 2px solid #e2e8f0; }
        td { padding: 15px; text-align: center; border-bottom: 1px solid #f1f5f9; }
        .img-cell { width: 130px; height: 130px; object-fit: cover; border-radius: 15px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <h1>Aura Gold</h1>
    
    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        <p style="font-size: 1.2rem;">✨ คลิกเพื่ออัปโหลดรูปภาพออร่าของคุณ ✨</p>
        <input type="file" id="fileInput" multiple accept="image/*" onchange="handlePreview(this)" style="display:none">
        <div id="instantPreview"></div>
    </div>

    <div class="control-panel">
        <div class="search-container">
            <input type="text" id="fmtSearch" placeholder="🔍 พิมพ์เพื่อค้นหานามสกุลไฟล์ (xlsx, csv, html...)" oninput="filterList()">
            <select id="fileFormat" size="5">
                <option value="xlsx" selected>Excel (.xlsx) - ยอดนิยม ⭐️</option>
                <option value="csv">CSV (.csv) - สำหรับ Data</option>
                <option value="json">JSON (.json) - สำหรับ Programmer</option>
                <option value="txt">Text (.txt) - ข้อความธรรมดา</option>
                <option value="html">HTML (.html) - หน้าเว็บตาราง</option>
                <option value="md">Markdown (.md) - ตารางสวยๆ</option>
            </select>
        </div>
        
        <div style="display: flex; flex-direction: column; justify-content: center;">
            <button class="btn btn-build" onclick="createTable()">1. สร้างตารางรูปภาพ</button>
            <button id="dlBtn" class="btn btn-download" onclick="doExport()" disabled>2. ดาวน์โหลดไฟล์</button>
        </div>
    </div>

    <div id="tableOutput" class="table-area"></div>
</div>

<script>
    let finalData = [];

    function filterList() {
        const val = document.getElementById('fmtSearch').value.toLowerCase();
        const options = document.querySelectorAll('#fileFormat option');
        options.forEach(opt => {
            opt.style.display = opt.text.toLowerCase().includes(val) ? 'block' : 'none';
        });
    }

    function handlePreview(input) {
        const grid = document.getElementById('instantPreview');
        grid.innerHTML = '';
        Array.from(input.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.createElement('img');
                img.src = e.target.result;
                img.className = 'preview-img';
                grid.appendChild(img);
            };
            reader.readAsDataURL(file);
        });
    }

    function createTable() {
        const files = Array.from(document.getElementById('fileInput').files);
        if (files.length === 0) return alert("กรุณาเลือกไฟล์ก่อนนะออเจ้า");

        const sorted = files.map(f => ({
            name: f.name,
            num: parseInt(f.name.replace(/\D/g, '')) || 0,
            url: URL.createObjectURL(f)
        })).sort((a, b) => a.num - b.num);

        const odds = sorted.filter(x => x.num % 2 !== 0);
        const evens = sorted.filter(x => x.num % 2 === 0);
        const rowCount = Math.max(odds.length, evens.length);

        finalData = [];
        let html = `<table><thead><tr><th>คอลัมน์ 1 (เลขคี่)</th><th>คอลัมน์ 2 (เลขคู่)</th></tr></thead><tbody>`;

        for(let i=0; i<rowCount; i++) {
            const o = odds[i], e = evens[i];
            finalData.push({ "คอลัมน์ 1 (เลขคี่)": o ? o.name : "-", "คอลัมน์ 2 (เลขคู่)": e ? e.name : "-" });
            html += `<tr>
                <td>${o ? `<img src="${o.url}" class="img-cell"><br><b>${o.name}</b>` : '-'}</td>
                <td>${e ? `<img src="${e.url}" class="img-cell"><br><b>${e.name}</b>` : '-'}</td>
            </tr>`;
        }
        document.getElementById('tableOutput').innerHTML = html + "</tbody></table>";
        document.getElementById('dlBtn').disabled = false;
    }

    function doExport() {
        const format = document.getElementById('fileFormat').value;
        const fileName = `aura_report_${new Date().getTime()}`;

        if (format === 'xlsx') {
            // ใช้ Library SheetJS สร้าง XLSX
            const worksheet = XLSX.utils.json_to_sheet(finalData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Images_Report");
            XLSX.writeFile(workbook, `${fileName}.xlsx`);
        } 
        else if (format === 'csv') {
            const worksheet = XLSX.utils.json_to_sheet(finalData);
            const csv = XLSX.utils.sheet_to_csv(worksheet);
            saveFile(new Blob(["\uFEFF" + csv], {type: 'text/csv'}), `${fileName}.csv`);
        }
        else if (format === 'json') {
            saveFile(new Blob([JSON.stringify(finalData, null, 2)], {type: 'application/json'}), `${fileName}.json`);
        }
        else if (format === 'txt') {
            const txt = finalData.map(r => `คี่: ${r["คอลัมน์ 1 (เลขคี่)"]} | คู่: ${r["คอลัมน์ 2 (เลขคู่)"]}`).join("\n");
            saveFile(new Blob([txt], {type: 'text/plain'}), `${fileName}.txt`);
        }
        else if (format === 'html') {
            const html = `<html><style>table,th,td{border:1px solid black;border-collapse:collapse;padding:10px;}</style><body><h2>Aura Report</h2><table><tr><th>Odd</th><th>Even</th></tr>` + 
                         finalData.map(r => `<tr><td>${r["คอลัมน์ 1 (เลขคี่)"]}</td><td>${r["คอลัมน์ 2 (เลขคู่)"]}</td></tr>`).join("") + `</table></body></html>`;
            saveFile(new Blob([html], {type: 'text/html'}), `${fileName}.html`);
        }
        else if (format === 'md') {
            const md = `| Odd | Even |\n|---|---|\n` + finalData.map(r => `| ${r["คอลัมน์ 1 (เลขคี่)"]} | ${r["คอลัมน์ 2 (เลขคู่)"]} |`).join("\n");
            saveFile(new Blob([md], {type: 'text/markdown'}), `${fileName}.md`);
        }
    }

    function saveFile(blob, name) {
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = name;
        link.click();
    }
</script>

</body>
</html>
