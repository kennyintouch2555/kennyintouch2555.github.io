<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Organizer Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --success: #22c55e;
            --bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 1000px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.5);
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        /* Upload Zone */
        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            transition: 0.3s;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        #fileInput { display: none; }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }

        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .btn-success { background: var(--success); color: white; box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3); }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; }
        .btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }

        /* Table Style */
        .table-wrapper {
            margin-top: 40px;
            overflow-x: auto;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #f1f5f9;
            padding: 15px;
            color: #475569;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f1f5f9;
            text-align: center;
            width: 50%;
        }

        .img-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .img-preview {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border: 3px solid white;
        }

        .filename {
            font-size: 0.75rem;
            color: #64748b;
            font-weight: bold;
        }

        .empty-slot {
            color: #cbd5e1;
            font-style: italic;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Image Organizer</h1>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <p style="font-size: 1.2rem; color: #475569;">คลิกเพื่อเลือกรูปภาพจำนวนมาก</p>
        <p style="color: #94a3b8; font-size: 0.9rem;">(ชื่อไฟล์ควรเป็นตัวเลขเพื่อให้ระบบเรียงได้ถูกต้อง)</p>
        <input type="file" id="fileInput" multiple accept="image/*">
    </div>

    <div class="btn-group">
        <button class="btn btn-primary" onclick="generateVisualTable()">
            ✨ สร้างตารางออร่า
        </button>
        <button id="downloadBtn" class="btn btn-success" onclick="downloadCSV()" disabled>
            📥 ดาวน์โหลด CSV
        </button>
    </div>

    <div id="tableContainer" class="table-wrapper"></div>
</div>

<script>
    let csvRows = [];

    function generateVisualTable() {
        const fileInput = document.getElementById('fileInput');
        const files = Array.from(fileInput.files);
        
        if (files.length === 0) {
            alert('ช่วยเลือกรูปภาพก่อนนะจ๊ะ!');
            return;
        }

        // 1. จัดการข้อมูลและเรียงเลข
        const fileData = files.map(file => {
            const num = parseInt(file.name.replace(/\D/g, '')) || 0;
            return { file, num, url: URL.createObjectURL(file), name: file.name };
        });

        fileData.sort((a, b) => a.num - b.num);

        const odds = fileData.filter(item => item.num % 2 !== 0);
        const evens = fileData.filter(item => item.num % 2 === 0);

        // 2. สร้างตาราง Visual
        const maxRows = Math.max(odds.length, evens.length);
        let tableHtml = `
            <table>
                <thead>
                    <tr>
                        <th>คอลัมน์ 1 (เลขคี่)</th>
                        <th>คอลัมน์ 2 (เลขคู่)</th>
                    </tr>
                </thead>
                <tbody>
        `;

        csvRows = []; // ล้างข้อมูลเก่าสำหรับ CSV

        for (let i = 0; i < maxRows; i++) {
            const odd = odds[i];
            const even = evens[i];

            // เก็บชื่อไฟล์ไว้ลง CSV
            csvRows.push([odd ? odd.name : "", even ? even.name : ""]);

            tableHtml += `
                <tr>
                    <td>${createImgBox(odd)}</td>
                    <td>${createImgBox(even)}</td>
                </tr>
            `;
        }

        tableHtml += `</tbody></table>`;
        document.getElementById('tableContainer').innerHTML = tableHtml;
        document.getElementById('downloadBtn').disabled = false;
    }

    function createImgBox(item) {
        if (!item) return '<span class="empty-slot">ไม่มีข้อมูล</span>';
        return `
            <div class="img-container">
                <img src="${item.url}" class="img-preview">
                <span class="filename">${item.name}</span>
            </div>
        `;
    }

    function downloadCSV() {
        let csvContent = "\uFEFF"; // รองรับภาษาไทย
        csvContent += "Column 1 (Odd),Column 2 (Even)\n";
        
        csvRows.forEach(row => {
            csvContent += row.join(",") + "\n";
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "organized_images.csv";
        link.click();
    }
</script>

</body>
</html>
