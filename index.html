<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Image Organizer & Exporter</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #f43f5e;
            --accent: #8b5cf6;
            --success: #10b981;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: #0f172a; /* Dark Mode Theme สำหรับออร่า */
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, rgba(244, 63, 94, 0.15) 0, transparent 50%);
            color: #f1f5f9;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            background: linear-gradient(to right, #818cf8, #fb7185);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        /* Upload Zone */
        .upload-card {
            background: rgba(255,255,255,0.05);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-card:hover { border-color: var(--primary); background: rgba(99, 102, 241, 0.1); }

        #instantPreview {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .preview-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; border: 2px solid rgba(255,255,255,0.1); }

        /* Control Panel */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
            padding: 25px;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
        }

        @media (max-width: 600px) { .controls { grid-template-columns: 1fr; } }

        .search-box {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        input[type="text"], select {
            background: #334155;
            border: 1px solid #475569;
            color: white;
            padding: 12px;
            border-radius: 12px;
            outline: none;
        }

        .btn {
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-build { background: var(--primary); color: white; }
        .btn-download { background: var(--success); color: white; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Table */
        .table-area {
            margin-top: 30px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            color: #1e293b;
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f5f9; padding: 15px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 15px; text-align: center; border-bottom: 1px solid #f1f5f9; }
        .img-cell { width: 120px; height: 120px; object-fit: cover; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <h1>Aura Organizer</h1>
    
    <div class="upload-card" onclick="document.getElementById('fileInput').click()">
        <p>เลือกรูปภาพ (ที่มีตัวเลขในชื่อ) เพื่อเริ่มเวทมนตร์</p>
        <input type="file" id="fileInput" multiple accept="image/*" onchange="previewImages(this)" style="display:none">
        <div id="instantPreview"></div>
    </div>

    <div class="controls">
        <div class="search-box">
            <label>🔍 ค้นหาประเภทไฟล์ที่ต้องการดาวน์โหลด:</label>
            <input type="text" id="formatSearch" placeholder="พิมพ์ชื่อนามสกุล เช่น csv, json, html..." oninput="filterFormats()">
            <select id="fileFormat" size="5">
                <option value="csv" selected>.CSV (Excel Spreadsheet)</option>
                <option value="json">.JSON (Data Object)</option>
                <option value="txt">.TXT (Plain Text)</option>
                <option value="html">.HTML (Standalone Table)</option>
                <option value="xml">.XML (Extensible Markup)</option>
                <option value="md">.MD (Markdown Table)</option>
            </select>
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 10px; justify-content: center;">
            <button class="btn btn-build" onclick="buildTable()">✨ สร้างตารางรูปภาพ</button>
            <button id="dlBtn" class="btn btn-download" onclick="exportFile()" disabled>📥 ดาวน์โหลดไฟล์</button>
        </div>
    </div>

    <div id="tableOutput" class="table-area"></div>
</div>

<script>
    let currentData = [];

    // ฟังก์ชันค้นหานามสกุลไฟล์
    function filterFormats() {
        const term = document.getElementById('formatSearch').value.toLowerCase();
        const options = document.querySelectorAll('#fileFormat option');
        options.forEach(opt => {
            const text = opt.text.toLowerCase();
            opt.style.display = text.includes(term) ? 'block' : 'none';
        });
    }

    function previewImages(input) {
        const preview = document.getElementById('instantPreview');
        preview.innerHTML = '';
        Array.from(input.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.createElement('img');
                img.src = e.target.result;
                img.className = 'preview-img';
                preview.appendChild(img);
            };
            reader.readAsDataURL(file);
        });
    }

    function buildTable() {
        const files = Array.from(document.getElementById('fileInput').files);
        if(files.length === 0) return alert("กรุณาเลือกไฟล์ก่อนครับ");

        const items = files.map(f => ({
            name: f.name,
            num: parseInt(f.name.replace(/\D/g, '')) || 0,
            url: URL.createObjectURL(f)
        })).sort((a, b) => a.num - b.num);

        const odds = items.filter(i => i.num % 2 !== 0);
        const evens = items.filter(i => i.num % 2 === 0);
        const rows = Math.max(odds.length, evens.length);

        currentData = [];
        let html = `<table><thead><tr><th>คอลัมน์ 1 (เลขคี่)</th><th>คอลัมน์ 2 (เลขคู่)</th></tr></thead><tbody>`;

        for(let i=0; i<rows; i++) {
            const o = odds[i], e = evens[i];
            currentData.push({ odd: o ? o.name : '-', even: e ? e.name : '-' });
            html += `<tr>
                <td>${o ? `<img src="${o.url}" class="img-cell"><br><b>${o.name}</b>` : '-'}</td>
                <td>${e ? `<img src="${e.url}" class="img-cell"><br><b>${e.name}</b>` : '-'}</td>
            </tr>`;
        }
        document.getElementById('tableOutput').innerHTML = html + `</tbody></table>`;
        document.getElementById('dlBtn').disabled = false;
    }

    function exportFile() {
        const format = document.getElementById('fileFormat').value;
        let content = '', type = '', ext = format;

        switch(format) {
            case 'csv':
                content = "\uFEFFOdd Number,Even Number\n" + currentData.map(r => `${r.odd},${r.even}`).join("\n");
                type = 'text/csv';
                break;
            case 'json':
                content = JSON.stringify(currentData, null, 2);
                type = 'application/json';
                break;
            case 'txt':
                content = currentData.map(r => `คี่: ${r.odd} | คู่: ${r.even}`).join("\n");
                type = 'text/plain';
                break;
            case 'html':
                content = `<html><body><table border="1"><tr><th>Odd</th><th>Even</th></tr>` + 
                          currentData.map(r => `<tr><td>${r.odd}</td><td>${r.even}</td></tr>`).join("") + 
                          `</table></body></html>`;
                type = 'text/html';
                break;
            case 'xml':
                content = `<?xml version="1.0" encoding="UTF-8"?><root>` + 
                          currentData.map(r => `<row><odd>${r.odd}</odd><even>${r.even}</even></row>`).join("") + 
                          `</root>`;
                type = 'application/xml';
                break;
            case 'md':
                content = `| Odd (คี่) | Even (คู่) |\n|---|---|\n` + currentData.map(r => `| ${r.odd} | ${r.even} |`).join("\n");
                type = 'text/markdown';
                break;
        }

        const blob = new Blob([content], { type: type + ';charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `exported_data.${ext}`;
        link.click();
    }
</script>

</body>
</html>
